name: Release Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  update-homepage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token that can push to trigger downstream deployments
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Update version badge in homepage
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Update the version badge span
          sed -i "s|<span class=\"version-tag\" id=\"app-version\">.*</span>|<span class=\"version-tag\" id=\"app-version\">${VERSION}</span>|" docs/index.html
          # Update the Gitee release download URL (versioned path)
          sed -i "s|gitee.com/ztxdcyy/Speakin/releases/download/[^/]*/Speakin.dmg|gitee.com/ztxdcyy/Speakin/releases/download/${VERSION}/Speakin.dmg|g" docs/index.html
          echo "Updated homepage to ${VERSION}"
          grep -n "app-version\|gitee.*download" docs/index.html

      - name: Commit updated homepage
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update homepage version to ${{ steps.version.outputs.tag }}"
          git push

      - name: Deploy to EdgeOne Pages
        # Only runs if you configure EdgeOne CLI deployment.
        # Set EDGEONE_TOKEN in repo Settings → Secrets → Actions.
        if: ${{ env.EDGEONE_TOKEN != '' }}
        env:
          EDGEONE_TOKEN: ${{ secrets.EDGEONE_TOKEN }}
        run: |
          npx edgeone pages deploy docs \
            -n speakin \
            -t "$EDGEONE_TOKEN"
